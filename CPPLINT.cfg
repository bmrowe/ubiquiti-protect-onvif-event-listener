# Google C++ Style Guide — cpplint configuration
# https://google.github.io/styleguide/cppguide.html

# cpplint version header length limit
linelength=100

# Filters: suppress categories that conflict with our deliberate choices.
#   -build/include_subdir  : headers are in the same directory (no subdir prefix needed)
#   -legal/copyright       : no file-level copyright blocks required
#   -build/c++11           : we intentionally use C++17
#   -readability/todo      : we use bare "// TODO:" comments; ownership tracked by git blame
#   -readability/check     : tests use a hand-rolled CHECK macro, not gtest
#   -whitespace/newline    : short paired one-line if-bodies are OK
#   -whitespace/comments   : single-space-before-comment is fine
filter=-build/include_subdir,-legal/copyright,-build/c++11,-readability/todo,-readability/check,-whitespace/newline,-whitespace/comments
